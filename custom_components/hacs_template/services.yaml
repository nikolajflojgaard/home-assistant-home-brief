increment_counter:
  name: Increment counter
  description: Increment the stored counter for an entry.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID.
      required: true
      selector:
        text:

set_counter:
  name: Set counter
  description: Set the stored counter for an entry.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry ID.
      required: true
      selector:
        text:
    value:
      name: Value
      description: Counter value (integer).
      required: true
      selector:
        number:
          min: 0
          max: 1000000
          mode: box

